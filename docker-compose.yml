version: "3.9"

services:
  streamlit:
    build: .
    container_name: rag_app
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - rag_net

  nginx:
    image: nginx:1.25-alpine
    container_name: rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit
    networks:
      - rag_net

networks:
  rag_net:
    driver: bridge
